<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Radares Privado</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #17212b; color: #f5f5f5; }
        h2 { text-align: center; color: #5288c1; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #b1c3d4; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #24313f; border-radius: 8px; box-sizing: border-box; background-color: #24313f; color: #fff; font-size: 16px; }
        input:focus { border-color: #5288c1; outline: none; }
        button { width: 100%; padding: 14px; background-color: #5288c1; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: background 0.2s; }
        button:hover { background-color: #4172a5; }
        button:disabled { background-color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>🎯 Criar Novo Radar</h2>
    
    <div class="form-group">
        <label for="origem">Aeroporto de Origem (Código IATA):</label>
        <input type="text" id="origem" placeholder="Ex: SAO" maxlength="3" style="text-transform: uppercase;">
    </div>
    
    <div class="form-group">
        <label for="destino">Aeroporto de Destino (Código IATA):</label>
        <input type="text" id="destino" placeholder="Ex: RIO" maxlength="3" style="text-transform: uppercase;">
    </div>
    
    <div class="form-group">
        <label for="preco">Preço Máximo Alvo (R$):</label>
        <input type="number" id="preco" placeholder="Ex: 1500">
    </div>

    <button id="btn-salvar">💾 Salvar no Meu Bot</button>

    <script>
        // Inicializa a biblioteca do Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Força o painel a abrir em tela cheia no celular

        // Captura o ID do usuário de dentro do Telegram de forma nativa
        const chat_id = tg.initDataUnsafe?.user?.id || "TESTE_LOCAL";

        document.getElementById("btn-salvar").addEventListener("click", function() {
            const origem = document.getElementById("origem").value.trim().toUpperCase();
            const destino = document.getElementById("destino").value.trim().toUpperCase();
            const preco_maximo = document.getElementById("preco").value.trim();

            if (!origem || !destino || !preco_maximo) {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            // LINK DO SEU SERVIDOR NO RENDER (A sua API oficial)
            const url_render = "https://rastreador-passagens.onrender.com";

            const dadosRadar = {
                chat_id: chat_id,
                origem: origem,
                destino: destino,
                preco_maximo: parseFloat(preco_maximo)
            };

            // Trava o botão para o usuário não clicar duas vezes
            const botao = document.getElementById("btn-salvar");
            botao.innerText = "⏳ Gravando dados...";
            botao.disabled = true;

            // Envia os dados de verdade do GitHub para o Render
            fetch(url_render, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dadosRadar)
            })
            .then(response => {
                if (response.ok) {
                    alert("✅ Radar gravado com sucesso no banco de dados!");
                    tg.close(); // Só fecha o painel no Telegram se o Render responder Sucesso (200)
                } else {
                    alert("❌ O Render recusou os dados. Código de erro.");
                    resetBotao();
                }
            })
            .catch(error => {
                console.error("Erro no fetch:", error);
                alert("❌ Falha de comunicação! O servidor do Render está desligado ou a URL está errada.");
                resetBotao();
            });
        });

        function resetBotao() {
            const botao = document.getElementById("btn-salvar");
            botao.innerText = "💾 Salvar no Meu Bot";
            botao.disabled = false;
        }
    </script>
</body>
</html>
