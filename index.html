<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor de Busca - Radar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --input-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 22px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="date"], input[type="tel"], select { width: 100%; padding: 12px; border: 1px solid var(--hint-color); border-radius: 8px; box-sizing: border-box; background-color: var(--input-bg); color: var(--text-color); font-size: 16px; }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 10px; background-color: var(--input-bg); border-radius: 8px; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; }
        .hidden { display: none; }
        button.submit-btn { width: 100%; padding: 15px; background-color: var(--button-color); color: var(--button-text); border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .section-title { margin-top: 25px; margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid var(--hint-color); padding-bottom: 5px; color: var(--button-color); }
        
        /* 🛠️ CURATIVO DO AUTOCOMPLETE: Posicionamento absoluto corrigido e z-index elevado */
        .autocomplete-container { position: relative; width: 100%; }
        .suggestions-list {
            position: absolute; top: 45px; left: 0; width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--hint-color); border-radius: 8px;
            max-height: 200px; overflow-y: auto; z-index: 9999;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.25); display: none;
        }
        .suggestion-item {
            padding: 12px; cursor: pointer; font-size: 14px;
            border-bottom: 1px solid rgba(153,153,153,0.2);
            color: var(--text-color);
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: var(--button-color); color: var(--button-text); }
    </style>
</head>
<body>

    <h2 id="titulo_form">🎛️ Novo Radar</h2>

    <form id="radarForm">
        <div class="section-title">📍 Rotas Principais</div>
        
        <div class="form-group">
            <label>Origem (Onde você está?)</label>
            <div class="autocomplete-container">
                <input type="text" id="origemInput" placeholder="Ex: Manaus ou MAO" autocomplete="off" required>
                <div id="origemSuggestions" class="suggestions-list"></div>
            </div>
        </div>
        
        <div class="form-group">
            <label>Destino (Para onde quer ir?)</label>
            <div class="autocomplete-container">
                <input type="text" id="destinoInput" placeholder="Ex: São Paulo ou SAO" autocomplete="off" required>
                <div id="destinoSuggestions" class="suggestions-list"></div>
            </div>
        </div>

        <div class="form-group"><label>Data de Partida</label><input type="date" id="data_partida" required></div>
        <div class="checkbox-group"><input type="checkbox" id="datas_flexiveis"><label style="margin:0;">Ativar Datas Flexíveis</label></div>
        <div id="div_flex" class="row hidden">
            <div class="form-group"><label>Dias Antes (-)</label><input type="number" id="dias_antes" min="0" max="7" value="0"></div>
            <div class="form-group"><label>Dias Depois (+)</label><input type="number" id="dias_depois" min="0" max="7" value="0"></div>
        </div>

        <div class="section-title">💵 Alvo e Limites</div>
        <div class="row">
            <div class="form-group"><label>Preço Máximo (R$)</label><input type="number" id="preco_alvo" step="0.01" required></div>
            <div class="form-group"><label>Margem (%)</label><input type="number" id="margem" min="0" value="0"></div>
        </div>

        <div class="section-title">💥 Estratégia Oculta (Skiplagging)</div>
        <div class="row">
            <div class="form-group">
                <label>Aplicar na Principal?</label>
                <select id="skip_principal"><option value="nao">Não</option><option value="sim">Sim</option></select>
            </div>
            <div class="form-group" id="div_paradas_principal" class="hidden">
                <label>Máx Paradas</label><input type="number" id="paradas_principal" min="0" value="1">
            </div>
        </div>

        <div class="section-title">🚌 Rota Alternativa (Opcional)</div>
        <div class="form-group">
            <label>Aeroporto Alternativo</label>
            <div class="autocomplete-container">
                <input type="text" id="alternativoInput" placeholder="Ex: Rio de Janeiro" autocomplete="off">
                <div id="alternativoSuggestions" class="suggestions-list"></div>
            </div>
        </div>
        
        <div id="div_alternativo" class="hidden">
            <div class="row">
                <div class="form-group"><label>Máx Paradas Alt.</label><input type="number" id="max_paradas" min="0" value="0"></div>
                <div class="form-group">
                    <label>Skip na Alternativa?</label>
                    <select id="skip_alternativa"><option value="nao">Não</option><option value="sim">Sim</option></select>
                </div>
            </div>
        </div>

        <div class="section-title">🚨 Despertador de Madrugada</div>
        <div class="form-group">
            <label>Como deseja ser avisado?</label>
            <select id="alerta_madrugada">
                <option value="telegram">💬 Apenas mensagem no Telegram</option>
                <option value="ligacao">📞 Ligação Telefônica do Robô (Twilio)</option>
            </select>
        </div>
        <div class="form-group hidden" id="div_telefone">
            <label>Celular com DDD (Somente números)</label>
            <input type="tel" id="telefone" placeholder="Ex: 11999999999">
        </div>

        <button type="submit" class="submit-btn" id="btnSalvar">💾 Salvar Radar no Motor</button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        window.radarEmEdicao = null; 
        const chat_id = tg.initDataUnsafe?.user?.id ? tg.initDataUnsafe.user.id.toString() : "123456789";

        // ==========================================
        // 🛩️ BANCO DE DADOS DE AEROPORTOS
        // ==========================================
        const BANCO_AEROPORTOS = [
            { nome: "São Paulo - TODOS OS AEROPORTOS (SAO)", iata: "SAO" },
            { nome: "São Paulo - Guarulhos (GRU)", iata: "GRU" },
            { nome: "São Paulo - Congonhas (CGH)", iata: "CGH" },
            { nome: "São Paulo - Campinas (VCP)", iata: "VCP" },
            { nome: "Rio de Janeiro - TODOS OS AEROPORTOS (RIO)", iata: "RIO" },
            { nome: "Rio de Janeiro - Galeão (GIG)", iata: "GIG" },
            { nome: "Rio de Janeiro - Santos Dumont (SDU)", iata: "SDU" },
            { nome: "Manaus - Eduardo Gomes (MAO)", iata: "MAO" },
            { nome: "Brasília - Presidente Juscelino Kubitschek (BSB)", iata: "BSB" },
            { nome: "Belo Horizonte - Confins (CNF)", iata: "CNF" },
            { nome: "Belo Horizonte - Pampulha (PLU)", iata: "PLU" },
            { nome: "Salvador - Dep. Luís Eduardo Magalhães (SSA)", iata: "SSA" },
            { nome: "Recife - Guararapes (REC)", iata: "REC" },
            { nome: "Fortaleza - Pinto Martins (FOR)", iata: "FOR" },
            { nome: "Curitiba - Afonso Pena (CWB)", iata: "CWB" },
            { nome: "Porto Alegre - Salgado Filho (POA)", iata: "POA" },
            { nome: "Florianópolis - Hercílio Luz (FLN)", iata: "FLN" },
            { nome: "Belém - Val-de-Cans (BEL)", iata: "BEL" },
            { nome: "Goiânia - Santa Genoveva (GYN)", iata: "GYN" },
            { nome: "Cuiabá - Marechal Rondon (CGB)", iata: "CGB" },
            { nome: "Vitória - Eurico de Aguiar Salles (VIX)", iata: "VIX" },
            { nome: "Natal - Aluízio Alves (NAT)", iata: "NAT" },
            { nome: "Maceió - Zumbi dos Palmares (MCZ)", iata: "MCZ" },
            { nome: "João Pessoa - Castro Pinto (JPA)", iata: "JPA" },
            { nome: "Aracaju - Santa Maria (AJU)", iata: "AJU" },
            { nome: "São Luís - Marechal Cunha Machado (SLZ)", iata: "SLZ" },
            { nome: "Teresina - Senador Petrônio Portella (THE)", iata: "THE" },
            { nome: "Campo Grande (CGR)", iata: "CGR" },
            { nome: "Porto Velho - Governador Jorge Teixeira (PVH)", iata: "PVH" },
            { nome: "Macapá - Alberto Alcolumbre (MCP)", iata: "MCP" },
            { nome: "Rio Branco - Plácido de Castro (RBR)", iata: "RBR" },
            { nome: "Boa Vista - Atlas Brasil Cantanhede (BVB)", iata: "BVB" },
            { nome: "Palmas - Brigadeiro Lysias Rodrigues (PMW)", iata: "PMW" },
            { nome: "Navegantes - Ministro Victor Konder (NVT)", iata: "NVT" },
            { nome: "Foz do Iguaçu - Cataratas (IGU)", iata: "IGU" }
        ];

        const codigosSelecionados = { origem: "", destino: "", alternativo: "" };

        function vincularAutocomplete(inputId, suggestionsId, chaveDicionario) {
            const input = document.getElementById(inputId);
            const box = document.getElementById(suggestionsId);

            input.addEventListener("input", function() {
                const termo = this.value.toLowerCase().trim();
                box.innerHTML = "";
                
                if (!termo) {
                    box.style.display = "none";
                    codigosSelecionados[chaveDicionario] = "";
                    if(chaveDicionario === 'alternativo') document.getElementById('div_alternativo').classList.add('hidden');
                    return;
                }

                const filtrados = BANCO_AEROPORTOS.filter(a => 
                    a.nome.toLowerCase().includes(termo) || a.iata.toLowerCase().includes(termo)
                );

                if (filtrados.length > 0) {
                    box.style.display = "block";
                    filtrados.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "suggestion-item";
                        div.innerText = item.nome;
                        
                        div.addEventListener("click", function() {
                            input.value = item.nome;
                            codigosSelecionados[chaveDicionario] = item.iata;
                            box.style.display = "none";
                            
                            if(chaveDicionario === 'alternativo') document.getElementById('div_alternativo').classList.remove('hidden');
                        });
                        box.appendChild(div);
                    });
                } else {
                    box.style.display = "none";
                }
            });

            document.addEventListener("click", function(e) {
                if (e.target !== input) box.style.display = "none";
            });
        }

        vincularAutocomplete("origemInput", "origemSuggestions", "origem");
        vincular
