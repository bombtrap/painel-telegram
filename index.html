<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor de Busca - Radar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --input-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 22px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="date"], input[type="tel"], select { width: 100%; padding: 12px; border: 1px solid var(--hint-color); border-radius: 8px; box-sizing: border-box; background-color: var(--input-bg); color: var(--text-color); font-size: 16px; }
        input[type="text"] { text-transform: uppercase; }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 10px; background-color: var(--input-bg); border-radius: 8px; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; }
        .hidden { display: none; }
        button.submit-btn { width: 100%; padding: 15px; background-color: var(--button-color); color: var(--button-text); border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .section-title { margin-top: 25px; margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid var(--hint-color); padding-bottom: 5px; color: var(--button-color); }
    </style>
</head>
<body>

    <h2 id="titulo_form">🎛️ Novo Radar</h2>

    <form id="radarForm">
        <div class="section-title">📍 Rota Principal</div>
        <div class="row">
            <div class="form-group"><label>Origem (IATA)</label><input type="text" id="origem" maxlength="3" required></div>
            <div class="form-group"><label>Destino (IATA)</label><input type="text" id="destino" maxlength="3" required></div>
        </div>
        <div class="form-group"><label>Data de Partida</label><input type="date" id="data_partida" required></div>
        <div class="checkbox-group"><input type="checkbox" id="datas_flexiveis"><label style="margin:0;">Ativar Datas Flexíveis</label></div>
        <div id="div_flex" class="row hidden">
            <div class="form-group"><label>Dias Antes (-)</label><input type="number" id="dias_antes" min="0" max="7" value="0"></div>
            <div class="form-group"><label>Dias Depois (+)</label><input type="number" id="dias_depois" min="0" max="7" value="0"></div>
        </div>

        <div class="section-title">💵 Alvo e Limites</div>
        <div class="row">
            <div class="form-group"><label>Preço Máximo (R$)</label><input type="number" id="preco_alvo" step="0.01" required></div>
            <div class="form-group"><label>Margem (%)</label><input type="number" id="margem" min="0" value="0"></div>
        </div>

        <div class="section-title">💥 Estratégia Oculta (Skiplagging)</div>
        <div class="row">
            <div class="form-group">
                <label>Aplicar na Principal?</label>
                <select id="skip_principal"><option value="nao">Não</option><option value="sim">Sim</option></select>
            </div>
            <div class="form-group" id="div_paradas_principal" class="hidden">
                <label>Máx Paradas</label><input type="number" id="paradas_principal" min="0" value="1">
            </div>
        </div>

        <div class="section-title">🚌 Rota Alternativa (Opcional)</div>
        <div class="form-group"><label>Aeroporto Alternativo (IATA)</label><input type="text" id="alternativo" maxlength="3"></div>
        
        <div id="div_alternativo" class="hidden">
            <div class="row">
                <div class="form-group"><label>Máx Paradas Alt.</label><input type="number" id="max_paradas" min="0" value="0"></div>
                <div class="form-group">
                    <label>Skip na Alternativa?</label>
                    <select id="skip_alternativa"><option value="nao">Não</option><option value="sim">Sim</option></select>
                </div>
            </div>
        </div>

        <div class="section-title">🚨 Despertador de Madrugada</div>
        <div class="form-group">
            <label>Como deseja ser avisado?</label>
            <select id="alerta_madrugada">
                <option value="telegram">💬 Apenas mensagem no Telegram</option>
                <option value="ligacao">📞 Ligação Telefônica do Robô (Twilio)</option>
            </select>
        </div>
        <div class="form-group hidden" id="div_telefone">
            <label>Celular com DDD (Somente números)</label>
            <input type="tel" id="telefone" placeholder="Ex: 11999999999">
        </div>

        <button type="submit" class="submit-btn" id="btnSalvar">💾 Salvar Radar no Motor</button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        window.radarEmEdicao = null; 
        const chat_id = tg.initDataUnsafe?.user?.id ? tg.initDataUnsafe.user.id.toString() : "123456789";

        document.getElementById('datas_flexiveis').addEventListener('change', function() { document.getElementById('div_flex').classList.toggle('hidden', !this.checked); });
        document.getElementById('skip_principal').addEventListener('change', function() { document.getElementById('div_paradas_principal').style.display = this.value === 'sim' ? 'block' : 'none'; });
        document.getElementById('alternativo').addEventListener('input', function() { document.getElementById('div_alternativo').classList.toggle('hidden', this.value.trim().length !== 3); });
        
        // Exibe o campo de telefone se escolher ligação
        document.getElementById('alerta_madrugada').addEventListener('change', function() {
            document.getElementById('div_telefone').classList.toggle('hidden', this.value !== 'ligacao');
        });

        document.addEventListener("DOMContentLoaded", async () => {
            document.getElementById('skip_principal').dispatchEvent(new Event('change'));
            const editId = new URLSearchParams(window.location.search).get('edit_id');

            if (editId) {
                window.radarEmEdicao = editId;
                document.getElementById("titulo_form").innerText = "✏️ Editar Radar #" + editId;
                document.getElementById("btnSalvar").innerText = "🔄 Atualizar Radar";
                
                try {
                    const res = await fetch(`/api/radar/${editId}`);
                    const dados = await res.json();

                    document.getElementById('origem').value = dados.origem || '';
                    document.getElementById('destino').value = dados.destino || '';
                    document.getElementById('data_partida').value = dados.data_partida || '';
                    document.getElementById('preco_alvo').value = dados.preco_alvo || '';
                    document.getElementById('margem').value = dados.margem || 0;
                    document.getElementById('skip_principal').value = dados.skip_principal || 'nao';
                    document.getElementById('paradas_principal').value = dados.paradas_principal || 0;
                    document.getElementById('alerta_madrugada').value = dados.alerta_madrugada || 'telegram';
                    document.getElementById('telefone').value = dados.telefone || '';
                    
                    if (dados.alternativo) {
                        document.getElementById('alternativo').value = dados.alternativo;
                        document.getElementById('max_paradas').value = dados.max_paradas || 0;
                        document.getElementById('skip_alternativa').value = dados.skip_alternativa || 'nao';
                    }

                    if (dados.datas_flexiveis) {
                        document.getElementById('datas_flexiveis').checked = true;
                        document.getElementById('dias_antes').value = dados.dias_antes || 0;
                        document.getElementById('dias_depois').value = dados.dias_depois || 0;
                    }

                    document.getElementById('datas_flexiveis').dispatchEvent(new Event('change'));
                    document.getElementById('skip_principal').dispatchEvent(new Event('change'));
                    document.getElementById('alternativo').dispatchEvent(new Event('input'));
                    document.getElementById('alerta_madrugada').dispatchEvent(new Event('change'));

                } catch (erro) { tg.showAlert("Erro ao carregar dados."); }
            }
        });

        document.getElementById('radarForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "Processando...";
            btn.disabled = true;

            const payload = {
                id: window.radarEmEdicao,
                chat_id: chat_id,
                origem: document.getElementById('origem').value.toUpperCase(),
                destino: document.getElementById('destino').value.toUpperCase(),
                alternativo: document.getElementById('alternativo').value.toUpperCase(),
                max_paradas: parseInt(document.getElementById('max_paradas').value) || 0,
                skip_principal: document.getElementById('skip_principal').value,
                paradas_principal: parseInt(document.getElementById('paradas_principal').value) || 0,
                skip_alternativa: document.getElementById('skip_alternativa').value,
                data_partida: document.getElementById('data_partida').value,
                datas_flexiveis: document.getElementById('datas_flexiveis').checked,
                dias_antes: parseInt(document.getElementById('dias_antes').value) || 0,
                dias_depois: parseInt(document.getElementById('dias_depois').value) || 0,
                preco_alvo: parseFloat(document.getElementById('preco_alvo').value),
                margem: parseFloat(document.getElementById('margem').value) || 0,
                alerta_madrugada: document.getElementById('alerta_madrugada').value,
                telefone: document.getElementById('telefone').value
            };

            try {
                const res = await fetch('/api/salvar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) {
                    tg.showAlert("Radar configurado com sucesso!", () => tg.close());
                } else {
                    tg.showAlert("Erro ao salvar dados.");
                    btn.innerText = "Tentar Novamente";
                    btn.disabled = false;
                }
            } catch (error) {
                tg.showAlert("Erro de conexão com o motor.");
                btn.innerText = "Tentar Novamente";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
