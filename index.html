<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buscador de Passagens</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #1a1a1a);
            --text: var(--tg-theme-text-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --input-bg: var(--tg-theme-secondary-bg-color, #2a2a2a);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="date"], input[type="tel"], select { 
            width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; 
            background-color: var(--input-bg); color: var(--text); font-size: 14px; box-sizing: border-box;
        }
        
        .row { display: flex; gap: 10px; align-items: center; }
        .row .form-group { flex: 1; margin-bottom: 0; }
        
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
        
        /* Checkboxes e Toggles */
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 14px; font-weight: bold; }
        .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--btn); }
        
        /* Mini inputs para paradas e dias */
        .mini-input { width: 60px !important; padding: 8px !important; text-align: center; }
        .flex-text { font-size: 13px; color: var(--hint); }

        button.submit-btn { width: 100%; padding: 15px; background-color: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Autocomplete */
        .autocomplete-container { position: relative; width: 100%; }
        .suggestions-list { position: absolute; top: 45px; left: 0; width: 100%; background-color: var(--input-bg); border: 1px solid #444; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 9999; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); display: none; }
        .suggestion-item { padding: 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #333; color: var(--text); }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: var(--btn); color: var(--btn-text); }
    </style>
</head>
<body>

    <form id="radarForm">
        <div class="form-group">
            <label>Origem:</label>
            <div class="autocomplete-container">
                <input type="text" id="origemInput" placeholder="Ex: Manaus ou MAO" autocomplete="off" required>
                <div id="origemSuggestions" class="suggestions-list"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Destino:</label>
            <div class="autocomplete-container">
                <input type="text" id="destinoInput" placeholder="Ex: São Paulo ou SAO" autocomplete="off" required>
                <div id="destinoSuggestions" class="suggestions-list"></div>
            </div>
            
            <div class="checkbox-row" style="margin-top: 10px;">
                <input type="checkbox" id="skip_principal"> Skiplagging
                <span id="div_paradas" style="display:none; margin-left: 10px; align-items: center; gap: 5px;">
                    <input type="number" id="paradas_principal" class="mini-input" value="1" min="1"> <span class="flex-text">paradas</span>
                </span>
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label>Destino Alternativo:</label>
            <div class="autocomplete-container">
                <input type="text" id="alternativoInput" placeholder="Ex: Rio de Janeiro (Opcional)" autocomplete="off">
                <div id="alternativoSuggestions" class="suggestions-list"></div>
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label>Data da Viagem:</label>
            <input type="date" id="data_partida" required>
            
            <div class="checkbox-row" style="margin-top: 10px;">
                <input type="checkbox" id="datas_flexiveis"> DATAS FLEXÍVEIS
            </div>
            <div id="div_flex" style="display:none; align-items: center; gap: 8px; margin-top: 8px;">
                <input type="number" id="dias_antes" class="mini-input" value="0" min="0"> <span class="flex-text">dias antes ou</span>
                <input type="number" id="dias_depois" class="mini-input" value="0" min="0"> <span class="flex-text">dias depois</span>
            </div>
        </div>

        <hr>

        <div class="row">
            <div class="form-group">
                <label>Preço Alvo (R$):</label>
                <input type="number" id="preco_alvo" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Margem de Aceite (%):</label>
                <input type="number" id="margem" value="10" required>
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label>Alerta de Madrugada:</label>
            <select id="alerta_madrugada">
                <option value="telegram">Apenas Telegram</option>
                <option value="ligacao">Ligação Telefônica</option>
            </select>
        </div>
        <div class="form-group" id="div_telefone" style="display:none;">
            <label>Telefone:</label>
            <input type="tel" id="telefone" placeholder="+55 99 9999-9999">
        </div>

        <button type="submit" class="submit-btn" id="btnSalvar">Salvar Configurações do Radar</button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Lógicas de Exibir/Ocultar (Skiplagging, Datas Flexíveis, Telefone)
        document.getElementById('skip_principal').addEventListener('change', function() {
            document.getElementById('div_paradas').style.display = this.checked ? 'flex' : 'none';
        });
        document.getElementById('datas_flexiveis').addEventListener('change', function() {
            document.getElementById('div_flex').style.display = this.checked ? 'flex' : 'none';
        });
        document.getElementById('alerta_madrugada').addEventListener('change', function() {
            document.getElementById('div_telefone').style.display = this.value === 'ligacao' ? 'block' : 'none';
        });

        // Banco de Aeroportos (Autocomplete)
        const BANCO_AEROPORTOS = [
            { nome: "São Paulo - TODOS OS AEROPORTOS (SAO)", iata: "SAO" },
            { nome: "São Paulo - Guarulhos (GRU)", iata: "GRU" },
            { nome: "São Paulo - Congonhas (CGH)", iata: "CGH" },
            { nome: "São Paulo - Campinas (VCP)", iata: "VCP" },
            { nome: "Rio de Janeiro - TODOS OS AEROPORTOS (RIO)", iata: "RIO" },
            { nome: "Rio de Janeiro - Galeão (GIG)", iata: "GIG" },
            { nome: "Rio de Janeiro - Santos Dumont (SDU)", iata: "SDU" },
            { nome: "Manaus - Eduardo Gomes (MAO)", iata: "MAO" },
            { nome: "Brasília - Presidente Juscelino Kubitschek (BSB)", iata: "BSB" },
            { nome: "Belo Horizonte - Confins (CNF)", iata: "CNF" },
            { nome: "Salvador - Dep. Luís Eduardo Magalhães (SSA)", iata: "SSA" },
            { nome: "Recife - Guararapes (REC)", iata: "REC" },
            { nome: "Fortaleza - Pinto Martins (FOR)", iata: "FOR" },
            { nome: "Curitiba - Afonso Pena (CWB)", iata: "CWB" }
        ];

        const codigos = { origem: "", destino: "", alternativo: "" };

        function setupAutocomplete(inputId, suggestionsId, chave) {
            const input = document.getElementById(inputId);
            const box = document.getElementById(suggestionsId);

            input.addEventListener("input", function() {
                const termo = this.value.toLowerCase().trim();
                box.innerHTML = "";
                if (!termo) { box.style.display = "none"; codigos[chave] = ""; return; }

                let filtrados = BANCO_AEROPORTOS.filter(a => a.nome.toLowerCase().includes(termo) || a.iata.toLowerCase().includes(termo));
                
                filtrados.sort((a, b) => {
                    const aTodos = a.nome.includes("TODOS OS AEROPORTOS");
                    const bTodos = b.nome.includes("TODOS OS AEROPORTOS");
                    if (aTodos && !bTodos) return -1;
                    if (!aTodos && bTodos) return 1;
                    return 0;
                });

                if (filtrados.length > 0) {
                    box.style.display = "block";
                    filtrados.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "suggestion-item";
                        div.innerText = item.nome;
                        div.addEventListener("click", function() {
                            input.value = item.nome;
                            codigos[chave] = item.iata;
                            box.style.display = "none";
                        });
                        box.appendChild(div);
                    });
                } else { box.style.display = "none"; }
            });

            document.addEventListener("click", function(e) { if (e.target !== input) box.style.display = "none"; });
        }

        setupAutocomplete("origemInput", "origemSuggestions", "origem");
        setupAutocomplete("destinoInput", "destinoSuggestions", "destino");
        setupAutocomplete("alternativoInput", "alternativoSuggestions", "alternativo");

        // Envio do Formulário
        document.getElementById('radarForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let iataO = codigos.origem || document.getElementById('origemInput').value.substring(0,3).toUpperCase();
            let iataD = codigos.destino || document.getElementById('destinoInput').value.substring(0,3).toUpperCase();
            let iataA = codigos.alternativo || (document.getElementById('alternativoInput').value ? document.getElementById('alternativoInput').value.substring(0,3).toUpperCase() : "");

            if (iataO.length < 3 || iataD.length < 3) { alert("Selecione os aeroportos válidos!"); return; }

            const payload = {
                chat_id: tg.initDataUnsafe?.user?.id || "teste",
                origem: iataO,
                destino: iataD,
                alternativo: iataA,
                skip_principal: document.getElementById('skip_principal').checked ? "sim" : "nao",
                paradas_principal: parseInt(document.getElementById('paradas_principal').value) || 0,
                data_partida: document.getElementById('data_partida').value,
                datas_flexiveis: document.getElementById('datas_flexiveis').checked,
                dias_antes: parseInt(document.getElementById('dias_antes').value) || 0,
                dias_depois: parseInt(document.getElementById('dias_depois').value) || 0,
                preco_alvo: parseFloat(document.getElementById('preco_alvo').value),
                margem: parseInt(document.getElementById('margem').value) || 0,
                alerta_madrugada: document.getElementById('alerta_madrugada').value,
                telefone: document.getElementById('telefone').value
            };

            const btn = document.getElementById("btnSalvar");
            btn.innerText = "⏳ Enviando..."; btn.disabled = true;

            fetch("/api/salvar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "sucesso") { alert("✅ Radar configurado com sucesso!"); tg.close(); } 
                else { alert("❌ Erro: " + data.erro); btn.innerText = "Salvar Configurações do Radar"; btn.disabled = false; }
            })
            .catch(error => { alert("❌ Falha de conexão!"); btn.innerText = "Salvar Configurações do Radar"; btn.disabled = false; });
        });
    </script>
</body>
</html>
