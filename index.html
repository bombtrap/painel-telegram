<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Rastreador</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0; padding: 15px;
        }
        .section { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="section">
        <label>Origem (Ex: MAO)</label>
        <input type="text" id="origem" placeholder="Código IATA">
        
        <label>Destino (Ex: GRU)</label>
        <input type="text" id="destino" placeholder="Código IATA">

        <label>Data da Viagem</label>
        <input type="date" id="dataPartida">

        <label>Preço Alvo (R$)</label>
        <input type="number" id="precoAlvo" placeholder="0.00">

        <label>Margem de Aceite (%)</label>
        <input type="number" id="margem" value="10">

        <label>Alerta de Madrugada</label>
        <select id="tipoAlertaMadrugada">
            <option value="telegram">Apenas Telegram</option>
            <option value="ligacao">Telegram + Ligação</option>
        </select>

        <label>Telefone (se escolheu ligação)</label>
        <input type="text" id="telefoneUsuario" placeholder="+5592999999999">
    </div>

    <button id="btnSubmeter">Salvar Configurações do Radar</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById("btnSubmeter").addEventListener("click", function() {
            const dadosConfig = {
                chat_id: tg.initDataUnsafe?.user?.id || "teste",
                origem: document.getElementById('origem').value.toUpperCase(),
                destino: document.getElementById('destino').value.toUpperCase(),
                data_partida: document.getElementById('dataPartida').value,
                preco_alvo: parseFloat(document.getElementById('precoAlvo').value),
                margem: parseInt(document.getElementById('margem').value) || 0,
                alerta_madrugada: document.getElementById('tipoAlertaMadrugada').value,
                telefone: document.getElementById('telefoneUsuario').value || ""
            };

            const btn = document.getElementById("btnSubmeter");
            btn.innerText = "⏳ Enviando...";
            btn.disabled = true;

            fetch("/api/salvar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dadosConfig)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "sucesso") {
                    alert("✅ Radar configurado com sucesso!");
                    tg.close();
                } else {
                    alert("❌ Erro: " + data.erro);
                    btn.innerText = "Salvar Configurações do Radar";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error("Erro:", error);
                alert("❌ Falha de conexão com o servidor.");
                btn.innerText = "Salvar Configurações do Radar";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
